<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Game</title>
    <link rel="stylesheet" href="simon.css">
</head>
<body>

    <div class="simon">
        <div class="heading">
            <h1 class="title">Simon Game</h1>
            <p class="level">Press any key to start the game</p>
        </div>

        <div class="boxes">
            <div class="lineone">
                <button class="blue box" id="blue"></button>
                <button class="green box" id="green"></button>
            </div>

            <div class="linetwo">
                <button class="yellow box" id="yellow"></button>
                <button class="saffron box" id="saffron"></button>
            </div>
        </div>
    </div>

    <script src="simon.js"></script>

</body>
</html>
